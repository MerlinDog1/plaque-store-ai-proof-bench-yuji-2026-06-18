<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuji Foundry - Agentic Plaque Proofing</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2312352d'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='800' fill='white'%3EY%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alex+Brush&family=Allura&family=Bebas+Neue&family=Bitter:wght@400;700&family=Caveat:wght@400;700&family=Cinzel:wght@400;700;900&family=Dancing+Script:wght@400;700&family=EB+Garamond:wght@400;600;700&family=Great+Vibes&family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Merriweather:wght@300;400;700&family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@300;400;600;700&family=Oswald:wght@400;600;700&family=Pacifico&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Raleway:wght@300;400;500;700&family=Roboto+Slab:wght@300;500;700&family=Satisfy&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --app-bg: #f7f1e7;
      --app-ink: #1b231f;
      --app-muted: #6a746d;
      --app-line: rgba(84, 72, 52, 0.14);
      --app-panel: rgba(255, 250, 240, 0.86);
      --app-panel-strong: rgba(255, 255, 250, 0.96);
      --app-brass: #b98235;
      --app-copper: #b66a4a;
      --app-teal: #2f7f69;
      --app-ink-deep: #13221d;
      --app-steel: #dbe2df;
      --app-sage: #dfece4;
    }

    html,
    body,
    #root {
      height: 100%;
      overflow: hidden;
    }

    html {
      background: var(--app-bg);
    }

    body {
      background:
        linear-gradient(90deg, rgba(19, 34, 29, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(19, 34, 29, 0.04) 1px, transparent 1px),
        radial-gradient(circle at 18% 9%, rgba(216, 177, 95, 0.24), transparent 26rem),
        radial-gradient(circle at 88% 14%, rgba(47, 127, 105, 0.14), transparent 28rem),
        linear-gradient(135deg, #f4efe5 0%, #fffdf7 46%, #eaf1eb 100%);
      background-size: 44px 44px, 44px 44px, auto, auto, auto;
      color: var(--app-ink);
      min-height: 100dvh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(84, 72, 52, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(84, 72, 52, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 78%);
      z-index: -1;
    }

    .glass-panel {
      background: rgba(255, 250, 240, 0.82);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(84, 72, 52, 0.14);
    }

    .studio-panel {
      background: linear-gradient(180deg, rgba(255, 255, 250, 0.92), rgba(246, 239, 226, 0.84));
      border: 1px solid var(--app-line);
      box-shadow: 0 24px 80px rgba(74, 57, 28, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(24px);
    }

    .studio-app-shell {
      height: 100dvh;
      overflow: hidden;
    }

    .precision-workbench {
      background:
        linear-gradient(180deg, rgba(255, 255, 250, 0.16), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 50% 96%, rgba(19, 34, 29, 0.10), transparent 34rem);
    }

    .command-ribbon {
      border-bottom: 1px solid rgba(84, 72, 52, 0.13);
      background:
        linear-gradient(90deg, rgba(255, 253, 247, 0.92), rgba(244, 239, 229, 0.86)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(233, 224, 209, 0.58));
      box-shadow: 0 10px 38px rgba(74, 57, 28, 0.10);
      backdrop-filter: blur(28px);
    }

    .view-switch,
    .header-tool {
      border: 1px solid rgba(84, 72, 52, 0.13);
      background: rgba(255, 253, 247, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .journey-rail,
    .inspector-bay,
    .command-deck,
    .inspector-head,
    .controls-instrument {
      background:
        linear-gradient(180deg, rgba(255, 255, 250, 0.94), rgba(245, 239, 228, 0.86)),
        linear-gradient(135deg, rgba(47, 127, 105, 0.08), rgba(185, 130, 53, 0.07));
      border: 1px solid rgba(84, 72, 52, 0.14);
      box-shadow:
        0 22px 70px rgba(74, 57, 28, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(24px);
    }

    .proof-bench {
      box-shadow: 0 30px 80px rgba(44, 53, 45, 0.14);
    }

    .rail-cap {
      color: #93681e;
      background: linear-gradient(180deg, #fff8e7, #e6d7bd);
      border: 1px solid rgba(198, 147, 46, 0.30);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .rail-step {
      border: 1px solid transparent;
      background: rgba(255, 253, 247, 0.46);
    }

    .rail-step:hover {
      background: rgba(231, 220, 200, 0.72);
      border-color: rgba(198, 147, 46, 0.24);
    }

    .rail-step.is-active {
      background: linear-gradient(180deg, #f4d88f, #dcb25d);
      border-color: rgba(145, 96, 24, 0.35);
      box-shadow: 0 10px 30px rgba(185, 130, 53, 0.18);
    }

    .rail-step.is-complete {
      background: linear-gradient(180deg, #e6f3ed, #cfdfd5);
      border-color: rgba(47, 127, 105, 0.18);
    }

    .timeline-rail {
      background:
        linear-gradient(180deg, rgba(255, 255, 250, 0.95), rgba(239, 232, 218, 0.88)),
        linear-gradient(90deg, transparent 0 4%, rgba(47, 127, 105, 0.11) 4% 96%, transparent 96%);
    }

    .timeline-track {
      position: relative;
    }

    .timeline-track::before {
      content: "";
      position: absolute;
      left: 6%;
      right: 6%;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, rgba(47, 127, 105, 0.72), rgba(185, 130, 53, 0.48), rgba(84, 72, 52, 0.18));
      pointer-events: none;
    }

    .timeline-rail .rail-step {
      position: relative;
      z-index: 1;
      min-height: 84px;
    }

    .timeline-rail .rail-index {
      border-radius: 999px;
    }

    .command-deck {
      background:
        linear-gradient(180deg, rgba(255, 253, 247, 0.95), rgba(239, 232, 218, 0.86)),
        repeating-linear-gradient(90deg, rgba(47, 127, 105, 0.05) 0 1px, transparent 1px 22px);
    }

    .bench-chip,
    .price-pill {
      border: 1px solid rgba(84, 72, 52, 0.14);
      background: rgba(255, 253, 247, 0.76);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
      color: #425049;
      font-size: 11px;
      font-weight: 900;
      padding: 0.38rem 0.65rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .price-pill {
      background: linear-gradient(180deg, #f4d88f, #c9963a);
      color: #17231f;
      border-color: rgba(145, 96, 24, 0.36);
    }

    .proof-shell {
      background:
        linear-gradient(180deg, rgba(19, 34, 29, 0.08), rgba(19, 34, 29, 0.02)),
        linear-gradient(135deg, rgba(255, 253, 247, 0.62), rgba(231, 237, 232, 0.72));
      border: 1px solid rgba(84, 72, 52, 0.13);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
    }

    .metric-tile {
      border: 1px solid rgba(84, 72, 52, 0.16);
      background: rgba(255, 253, 247, 0.82);
      box-shadow: 0 12px 34px rgba(44, 53, 45, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
    }

    .inspector-scroll {
      scrollbar-gutter: stable;
    }

    .controls-instrument {
      border-radius: 10px;
    }

    .step-intro {
      padding: 0.85rem;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 253, 247, 0.74), rgba(238, 230, 214, 0.48)),
        linear-gradient(90deg, rgba(47, 127, 105, 0.08), transparent);
      border: 1px solid rgba(84, 72, 52, 0.11);
    }

    .step-orbit {
      display: flex;
      width: 2.2rem;
      height: 2.2rem;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #f3d98a;
      background: #13221d;
      box-shadow: 0 10px 26px rgba(19, 34, 29, 0.2);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .controls-instrument section > div,
    .controls-instrument details {
      border-radius: 10px !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .control-choice,
    .control-pill,
    .control-input,
    .controls-instrument button,
    .controls-instrument select,
    .controls-instrument textarea,
    .controls-instrument input[type="number"] {
      border-color: rgba(84, 72, 52, 0.13) !important;
      background-color: rgba(255, 253, 247, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
    }

    .control-choice {
      position: relative;
      overflow: hidden;
    }

    .control-choice::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(47, 127, 105, 0.08), transparent 48%);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .control-choice:hover::before,
    .control-choice.is-active::before {
      opacity: 1;
    }

    .control-choice.is-active,
    .control-pill.is-active,
    .controls-instrument button[aria-pressed="true"] {
      background: linear-gradient(180deg, #f4d88f, #dcb35e) !important;
      border-color: rgba(145, 96, 24, 0.34) !important;
      color: #17231f;
    }

    .control-input {
      background: rgba(255, 253, 247, 0.84);
    }

    .size-preset-option {
      min-height: 68px;
      text-align: left;
    }

    .size-mini-stage {
      color: #23342e;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(231, 220, 200, 0.52)),
        linear-gradient(rgba(19, 34, 29, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(19, 34, 29, 0.055) 1px, transparent 1px);
      background-size: auto, 10px 10px, 10px 10px;
      border: 1px solid rgba(84, 72, 52, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .size-mini-plate {
      border-radius: 3px;
      box-shadow: 0 5px 12px rgba(19, 34, 29, 0.13);
    }

    .size-dims {
      color: #6b4b16;
      background: rgba(244, 216, 143, 0.48);
      border: 1px solid rgba(185, 130, 53, 0.16);
    }

    .proof-canvas {
      border-color: rgba(84, 72, 52, 0.16) !important;
      background:
        linear-gradient(rgba(19, 34, 29, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(19, 34, 29, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.78), transparent 26rem),
        linear-gradient(135deg, #f9f6ed 0%, #e7ede8 100%) !important;
      background-size: 30px 30px, 30px 30px, auto, auto !important;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.78),
        inset 0 -40px 80px rgba(19, 34, 29, 0.06),
        0 24px 70px rgba(44, 53, 45, 0.13);
    }

    .proof-canvas::after {
      content: "PRODUCTION DATUM";
      position: absolute;
      left: 1rem;
      bottom: 0.85rem;
      color: rgba(19, 34, 29, 0.34);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.18em;
      pointer-events: none;
    }

    .studio-press {
      transition: transform 160ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .studio-press:hover {
      transform: translateY(-1px);
    }

    .studio-press:active {
      transform: translateY(0) scale(0.985);
    }

    .studio-sheen {
      position: relative;
      overflow: hidden;
    }

    .studio-sheen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.12) 42%, transparent 58%);
      transform: translateX(-120%);
      transition: transform 700ms ease;
      pointer-events: none;
    }

    .studio-sheen:hover::after {
      transform: translateX(120%);
    }

    .app-fade-in {
      animation: appFadeIn 520ms ease-out both;
    }

    @keyframes appFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 767px) {
      .command-ribbon > div {
        height: 58px;
      }

      .workbench-grid {
        gap: 0.45rem;
      }

      .proof-bench {
        min-height: 0;
      }

      .command-deck {
        padding: 0.7rem;
      }

      .controls-instrument {
        border-radius: 10px 10px 0 0;
      }

      .proof-canvas {
        max-height: none;
      }
    }

    .proof-shell .print-content {
      height: 100%;
      min-height: 0;
      max-height: none;
      padding: 0.5rem;
      border: 0;
      background: #f8f5ed;
      border-radius: 0.5rem;
    }

    @media (min-width: 768px) {
      .proof-shell .print-content {
        min-height: 0;
        max-height: none;
        padding: 1.5rem;
      }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f6efe2;
    }

    ::-webkit-scrollbar-thumb {
      background: #6f624b;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #b98235;
    }

    /* --- Atelier proof studio target layout --- */
    .atelier-app {
      background:
        radial-gradient(circle at 16% 12%, rgba(192, 166, 112, 0.14), transparent 30rem),
        radial-gradient(circle at 80% 78%, rgba(48, 79, 66, 0.10), transparent 28rem),
        linear-gradient(135deg, #f7f3eb 0%, #fffdf8 48%, #efe8dc 100%);
    }

    .atelier-titlebar {
      height: 104px;
      flex: 0 0 104px;
      border-bottom: 1px solid rgba(60, 55, 46, 0.16);
      background: rgba(250, 247, 238, 0.88);
      backdrop-filter: blur(22px);
    }

    .atelier-mark,
    .atelier-rail-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(164, 129, 58, 0.52);
      border-radius: 50%;
      color: #8a672c;
      font-family: "Playfair Display", serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      background: rgba(255, 253, 247, 0.76);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 10px 24px rgba(80, 65, 36, 0.12);
    }

    .atelier-view-toggle,
    .atelier-header-button,
    .atelier-basket-button {
      border: 1px solid #d8cfbf;
      border-radius: 7px;
      background: rgba(255, 253, 247, 0.72);
      color: #39443d;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .atelier-view-toggle button,
    .atelier-header-button {
      min-height: 38px;
      padding: 0 0.85rem;
      font-size: 12px;
      font-weight: 900;
    }

    .atelier-view-toggle button.is-active {
      border-radius: 5px;
      background: #304f42;
      color: #fffaf0;
    }

    .atelier-basket-button {
      padding: 0.58rem;
    }

    .atelier-basket-button.is-ready {
      color: #8a672c;
    }

    .atelier-board {
      max-width: 1500px;
      margin: 0 auto;
    }

    .atelier-side-rail {
      margin-right: 18px;
      border: 1px solid #d9d0c0;
      border-right: 0;
      border-radius: 14px 0 0 14px;
      background: rgba(255, 253, 247, 0.70);
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.8), 0 20px 48px rgba(55, 48, 37, 0.12);
      backdrop-filter: blur(18px);
    }

    .atelier-step-button {
      display: flex;
      width: 62px;
      min-height: 58px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-left: 3px solid transparent;
      color: #5b655d;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .atelier-step-button span {
      font-size: 17px;
      line-height: 1;
    }

    .atelier-step-button small {
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .atelier-step-button:hover,
    .atelier-step-button.is-active {
      background: rgba(230, 221, 207, 0.74);
      color: #1d211e;
      transform: translateX(2px);
    }

    .atelier-step-button.is-active {
      border-left-color: #304f42;
    }

    .atelier-step-button.is-complete {
      color: #8a672c;
    }

    .atelier-rail-utility,
    .atelier-mini-menu,
    .atelier-kebab {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid #ddd4c6;
      border-radius: 50%;
      background: #fffdf7;
      color: #4f5b52;
      font-weight: 900;
    }

    .atelier-stage {
      border: 2px solid #272725;
      border-radius: 16px 0 0 16px;
      background:
        linear-gradient(rgba(58, 53, 44, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58, 53, 44, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 48% 43%, rgba(255,255,255,0.74), transparent 26rem),
        linear-gradient(135deg, #eee7da 0%, #f9f5eb 52%, #e3ded2 100%);
      background-size: 32px 32px, 32px 32px, auto, auto;
      box-shadow: 0 28px 70px rgba(50, 45, 35, 0.22);
    }

    .atelier-proof-pad {
      position: absolute;
      inset: 54px 58px 42px 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .atelier-proof-pad .print-content {
      width: 100%;
      height: 100%;
      max-height: none;
      padding: 0;
      border: 0 !important;
      border-radius: 0;
      background: transparent !important;
      box-shadow: none;
    }

    .atelier-proof-pad .print-content::after {
      display: none;
    }

    .atelier-proof-pad svg {
      filter: drop-shadow(0 28px 24px rgba(45, 38, 27, 0.30));
    }

    .atelier-dimension-top,
    .atelier-dimension-left {
      position: absolute;
      z-index: 5;
      color: #3f453f;
      font-size: 12px;
      font-weight: 700;
    }

    .atelier-dimension-top {
      left: 26%;
      right: 24%;
      top: 58px;
      text-align: center;
      border-top: 1px solid rgba(60, 55, 46, 0.38);
    }

    .atelier-dimension-left {
      left: 50px;
      top: 28%;
      bottom: 26%;
      writing-mode: vertical-rl;
      text-align: center;
      border-left: 1px solid rgba(60, 55, 46, 0.38);
    }

    .atelier-expand-button {
      position: absolute;
      right: 28px;
      bottom: 30px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid #ddd4c6;
      background: rgba(255, 253, 247, 0.88);
      color: #59645c;
      box-shadow: 0 10px 24px rgba(55, 48, 37, 0.16);
    }

    .atelier-customiser {
      border: 2px solid #272725;
      border-left: 1px solid #d8cfbf;
      border-radius: 0 16px 16px 0;
      background: rgba(250, 247, 238, 0.92);
      box-shadow: 0 28px 70px rgba(50, 45, 35, 0.16);
      backdrop-filter: blur(18px);
    }

    .atelier-customiser-head {
      height: 74px;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #ded5c6;
    }

    .atelier-control-scroll {
      height: calc(100% - 74px);
      overflow-y: auto;
    }

    .atelier-customiser .controls-instrument {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      padding: 14px 16px 18px;
      backdrop-filter: none;
    }

    .atelier-customiser .step-intro {
      display: none;
    }

    .atelier-customiser .controls-instrument section {
      display: block;
    }

    .atelier-customiser .controls-instrument section > div,
    .atelier-customiser .controls-instrument details {
      border-color: #ded5c6 !important;
      background: rgba(255, 253, 247, 0.62) !important;
      box-shadow: none;
    }

    .atelier-customiser .control-choice,
    .atelier-customiser .control-pill,
    .atelier-customiser .controls-instrument button,
    .atelier-customiser .controls-instrument select,
    .atelier-customiser .controls-instrument textarea,
    .atelier-customiser .controls-instrument input[type="number"] {
      border-radius: 5px !important;
      box-shadow: none !important;
    }

    .atelier-customiser .control-choice.is-active,
    .atelier-customiser .control-pill.is-active,
